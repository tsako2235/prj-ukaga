<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file:; media-src 'self' blob: file:; connect-src 'self' file: http://127.0.0.1:* http://localhost:*;"
    />
    <title>ukaga</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      canvas {
        display: block;
      }
      #message {
        display: none;
        position: absolute;
        inset: 0;
        padding: 24px;
        box-sizing: border-box;
        color: #222;
        font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo,
          sans-serif;
        font-size: 13px;
        line-height: 1.6;
        background: rgba(255, 255, 255, 0.92);
        white-space: pre-wrap;
      }
      #message.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="message"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
